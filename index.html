<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EA阅读器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8f0 50%, #fff0f5 100%);
            min-height: 100vh;
            color: #2d2d2d;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 16px 20px;
            background: white;
            border-bottom: 3px solid #ffc0cb;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 10px rgba(255,105,180,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .header h1 { font-size: 22px; color: #ff69b4; font-weight: 600; letter-spacing: 1px; }

        /* ── Upload ── */
        .upload-section { max-width: 600px; margin: 25px auto; padding: 20px; }
        .upload-area {
            background: white; border: 3px dashed #ffc0cb; border-radius: 15px;
            padding: 50px 30px; text-align: center; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 20px rgba(255,105,180,0.1);
        }
        .upload-area:active { transform: scale(0.98); }
        .upload-area.dragover { border-color: #ff1493; background: #ffe8f0; }
        .upload-icon { font-size: 56px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        .upload-text { color: #ff69b4; font-size: 18px; margin-bottom: 12px; font-weight: 600; }
        .upload-hint { color: #999; font-size: 14px; }
        #fileInput { display: none; }

        /* ── Controls ── */
        .controls {
            max-width: 900px; margin: 0 auto 16px;
            padding: 10px 20px; background: white; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(255,105,180,0.1);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .font-label { color: #ff69b4; font-weight: 600; font-size: 14px; }
        .font-btn {
            background: white; border: 2px solid #ffc0cb; color: #ff69b4;
            padding: 7px 13px; border-radius: 10px; cursor: pointer;
            font-size: 15px; font-weight: bold; min-width: 42px; min-height: 42px;
            touch-action: manipulation; transition: all 0.2s;
        }
        .font-btn:active { background: #ff69b4; color: white; transform: scale(0.95); }
        .font-size-display { color: #ff69b4; font-weight: bold; min-width: 48px; text-align: center; font-size: 14px; }

        /* ── Content ── */
        .content {
            max-width: 800px; margin: 0 auto 100px;
            padding: 26px 18px; background: white;
            border-radius: 15px; box-shadow: 0 8px 30px rgba(255,105,180,0.15);
            min-height: 400px;
            /* 允许文字选取 */
            -webkit-user-select: text;
            user-select: text;
        }
        .book-title {
            text-align: center; font-size: 19px; color: #ff69b4;
            margin-bottom: 20px; font-weight: 600;
            padding-bottom: 14px; border-bottom: 2px solid #ffe8f0;
        }
        .paragraph {
            margin-bottom: 16px; padding: 13px; border-radius: 10px;
            line-height: 2; position: relative;
        }
        .paragraph.has-comment { border-left: 4px solid #ffd700; background: #fffef9; }
        .paragraph-text { color: #333; word-wrap: break-word; word-break: break-word; }

        mark.ea-hi {
            background: #fff176; border-radius: 3px; padding: 0 2px;
            -webkit-text-decoration: underline; text-decoration: underline;
            -webkit-text-decoration-color: #ffd700; text-decoration-color: #ffd700;
        }

        /* ── Comments ── */
        .comments { margin-top: 12px; padding-top: 12px; border-top: 1px solid #ffe8f0; }
        .comment { padding: 10px 13px; border-radius: 10px; margin-top: 8px; }
        .comment.elena { background: linear-gradient(135deg,#ffe8f0,#fff0f5); margin-right: 14px; }
        .comment.ash   { background: linear-gradient(135deg,#e8f4ff,#f0f8ff); margin-left: 14px; }
        .comment-author { font-weight: 600; margin-bottom: 4px; font-size: 12px; }
        .comment.elena .comment-author { color: #ff69b4; }
        .comment.ash   .comment-author { color: #4a90e2; }
        .comment-quote {
            font-size: 12px; color: #888; margin-bottom: 5px; font-style: italic;
            border-left: 2px solid #ffd700; padding-left: 8px; line-height: 1.6;
        }
        .comment-text { color: #555; line-height: 1.7; word-wrap: break-word; }

        /* ── Selection Toolbar ── */
        /* 显示在选区下方，避开系统的「复制/全选」菜单 */
        #selToolbar {
            position: fixed;
            z-index: 9999;
            background: #222;
            border-radius: 22px;
            padding: 6px 10px;
            display: none;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            /* 横向居中靠 left + transform */
            transform: translateX(-50%);
            /* 小三角朝上（工具栏在选区下方） */
        }
        #selToolbar.show { display: flex; }
        #selToolbar::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-bottom-color: #222;
        }
        .sel-btn {
            background: #ff69b4; color: white; border: none;
            padding: 6px 14px; border-radius: 14px;
            font-size: 13px; font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        .sel-btn:active { background: #ff1493; }
        .sel-btn.cancel-btn { background: #555; padding: 6px 10px; }

        /* ── Comment Modal (bottom sheet) ── */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            z-index: 1000; display: none;
            align-items: flex-end; justify-content: center;
        }
        .overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 20px 20px 0 0;
            padding: 22px 18px 36px; width: 100%; max-width: 640px;
            max-height: 80vh; overflow-y: auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 38px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 0 auto 18px; }
        .modal-label { font-size: 12px; color: #ff69b4; font-weight: 600; margin-bottom: 6px; }
        .modal-quote {
            background: #fffbe6; border-left: 3px solid #ffd700;
            padding: 10px 13px; border-radius: 0 8px 8px 0;
            font-size: 14px; color: #555; line-height: 1.7;
            margin-bottom: 14px; word-break: break-word;
            max-height: 100px; overflow-y: auto;
        }
        .comment-input {
            width: 100%; padding: 12px; border: 2px solid #ffc0cb; border-radius: 12px;
            font-size: 16px; font-family: 'Noto Serif SC', serif;
            resize: vertical; min-height: 100px; line-height: 1.7; color: #333;
        }
        .comment-input:focus { outline: none; border-color: #ff69b4; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 12px; }
        .modal-btn {
            flex: 1; border: none; padding: 13px; border-radius: 12px;
            font-size: 15px; font-weight: 600; font-family: 'Noto Serif SC', serif;
            cursor: pointer; touch-action: manipulation; min-height: 48px;
        }
        .modal-btn.save   { background: linear-gradient(135deg,#ff69b4,#ff1493); color: white; }
        .modal-btn.cancel { background: #f0f0f0; color: #888; }
        .modal-btn:active { opacity: 0.85; transform: scale(0.98); }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-icon  { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-text  { font-size: 18px; margin-bottom: 10px; }
        .empty-hint  { font-size: 14px; color: #bbb; }

        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 2px solid #ffe8f0;
            padding: 8px 16px;
            display: none; justify-content: center; align-items: center;
            gap: 8px; box-shadow: 0 -4px 20px rgba(255,105,180,0.1); z-index: 100;
        }
        .bottom-nav.show { display: flex; }
        .nav-btn {
            background: linear-gradient(135deg,#ff69b4,#ff1493);
            color: white; border: none; padding: 7px 14px;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
            font-family: 'Noto Serif SC', serif; touch-action: manipulation; min-height: 38px;
        }
        .nav-btn.export { background: linear-gradient(135deg,#ffd700,#ffa500); }
        .nav-btn:disabled { background: #ddd; opacity: 0.5; }
        .nav-btn:active   { transform: scale(0.95); }
        .nav-info { color: #ff69b4; font-weight: 600; font-size: 13px; min-width: 52px; text-align: center; }

        @media (max-width: 768px) {
            .content { padding: 16px 13px; margin-bottom: 70px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📖 EA阅读器</h1>
</div>

<div class="upload-section" id="uploadSection">
    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📚</div>
        <div class="upload-text">点击或拖拽上传书籍</div>
        <div class="upload-hint">支持 TXT 格式</div>
    </div>
    <input type="file" id="fileInput" accept=".txt">
</div>

<div class="controls" id="controls" style="display:none">
    <span class="font-label">字号</span>
    <button class="font-btn" onclick="decreaseFontSize()">A−</button>
    <span class="font-size-display" id="fontSizeDisplay">18px</span>
    <button class="font-btn" onclick="increaseFontSize()">A+</button>
</div>

<div class="content" id="content">
    <div class="empty-state">
        <div class="empty-icon">📖</div>
        <div class="empty-text">还没有上传书籍</div>
        <div class="empty-hint">上传一本 TXT 文件开始共读吧 💕</div>
    </div>
</div>

<!-- 划词批注浮动按钮 -->
<div id="selToolbar">
    <button class="sel-btn" id="annotateBtn">💬 批注</button>
    <button class="sel-btn cancel-btn" id="cancelSelBtn">✕</button>
</div>

<!-- 批注输入 Modal -->
<div class="overlay" id="commentOverlay">
    <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-label">选取原文</div>
        <div class="modal-quote" id="modalQuote"></div>
        <div class="modal-label">💗 Elena 的批注</div>
        <textarea class="comment-input" id="commentInput" placeholder="写下你的想法..."></textarea>
        <div class="modal-buttons">
            <button class="modal-btn save"   id="saveBtn">保存 🐾</button>
            <button class="modal-btn cancel" id="cancelModalBtn">取消</button>
        </div>
    </div>
</div>

<!-- 底部翻页导航 -->
<div class="bottom-nav" id="bottomNav">
    <button class="nav-btn export"  id="exportBtn">📋 复制</button>
    <button class="nav-btn" id="prevBtnBottom">上一页</button>
    <span  class="nav-info" id="pageInfoBottom">1 / 1</span>
    <button class="nav-btn" id="nextBtnBottom">下一页</button>
</div>

<script src="app.js"></script>
</body>
</html>
